ta é: reversão da reserva de lucros a realizar para a conta de dividendos a pagar."}, {"id": "SM0079", "banca": "FGV - Bach (CFC)/CFC/2º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "A empresa Serviços S.A. encerrou seu exercício em 31/12/2024, deixando de efetuar o lançamento referente à receita de serviços prestados a umcliente em dezembro e ainda não recebidos, deixando de obedecer, assim, ao regime de competência. Como consequência do erro cometido pela ausência desse registro,", "alternativas": ["o saldo da conta clientes ficou superavaliado.", "o saldo do disponível ficou subavaliado.", "a receita do exercício ficou superavaliada.", "o lucro do exercício ficou subavaliado."], "correta": 3, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: o lucro do exercício ficou subavaliado."}, {"id": "SM0080", "banca": "FGV - Ana GM (Pref SJC)/Pref SJC/Ciências Contábeis/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em relação à contabilização de valores como redutores da receita bruta, avalie se os itens a seguir são contabilizados como deduções da receita devenda: I. Abatimentos de preço.II. Descontos no preço de venda concedidos incondicionalmente.III. Descontos concedidos a clientes por pagamentos antecipados de duplicatas. Está correto o que se indica em", "alternativas": ["I, somente.", "I e II, somente.", "I e III, somente.", "II e III, somente.", "I, II e III."], "correta": 1, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: I e II, somente."}, {"id": "SM0081", "banca": "FGV - Bach (CFC)/CFC/2º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Avalie se as divulgações relacionadas aos estoques de uma sociedade empresária devem incluir: I. valor de estoques reconhecido como despesa durante o período; II. valor de estoques escriturados pelo valor justo menos os custos de venda; III. valor total escriturado em estoques e o valor registrado em outras contas apropriadas para a entidade. De acordo com a NBC TG 16 (R2) – ESTOQUES, está correto o que se afirma em", "alternativas": ["I e II, somente.", "I e III, somente.", "II e III, somente.", "I, II e III."], "correta": 3, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: I, II e III."}, {"id": "SM0082", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "As demonstrações contábeis são normalmente elaboradas com base na suposição de que a entidade que reporta está em continuidade operacional.Desse modo, presume-se que a entidade não tem a intenção e nem a necessidade de", "alternativas": ["tornar-se internacional.", "modificar a sua atividade-fim.", "entrar em liquidação ou deixar de negociar.", "expandir os seus negócios para outras localidades."], "correta": 2, "comentario": "Pela continuidade operacional, presume-se que a entidade continuará operando e não pretende nem precisa entrar em liquidação. Portanto, a resposta correta é: entrar em liquidação ou deixar de negociar."}, {"id": "SM0083", "banca": "FGV - Bach (CFC)/CFC/2º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Um investidor está analisando as demonstrações contábeis de uma sociedade empresária. O investidor tem disponível, para a sua análise, asdemonstrações referentes a 31/12/2023, mas não as dos exercícios anteriores. Nesse caso, o investidor não poderá verificar a seguinte característicaqualitativa:", "alternativas": ["relevância.", "tempestividade.", "comparabilidade.", "compreensibilidade."], "correta": 2, "comentario": "Comparabilidade permite identificar semelhanças e diferenças entre itens, períodos ou entidades. Portanto, a resposta correta é: comparabilidade."}, {"id": "SM0084", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "A empresa ABC S.A. comprou materiais, em agosto de X1, com a finalidade de utilizá-los em suas atividades. O pagamento foi realizado em novembro de X1, e os materiais foram utilizados na prestação de serviços em setembro de X1. Esses materiais devem serreconhecidos como despesa no mês de", "alternativas": ["novembro de X1.", "setembro de X1.", "agosto de X1.", "dezembro de X1."], "correta": 1, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: setembro de X1."}, {"id": "SM0085", "banca": "FGV - Ana Leg (ALEP)/ALEP/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma loja de material de construção controla o seu estoque exclusivamente através de contagem física, realizada trimestralmente, antes daelaboração das demonstrações contábeis trimestrais. Pode-se afirmar que a loja controla o seu estoque por meio do inventário", "alternativas": ["padrão.", "periódico.", "ponderado.", "permanente.", "de observação."], "correta": 1, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: periódico."}, {"id": "SM0086", "banca": "FGV - Aud CE (TCE-PA)/TCE PA/Administrativa/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Leia o fragmento a seguir em relação à valoração do estoque. O custo dos estoques de itens que não são normalmente e de bens ou serviços produzidos e segregados para projetos deve ser atribuído pelouso da identificação específica dos seus custos individuais. Assinale a opção cujos itens completam corretamente as lacunas do fragmento acima.", "alternativas": ["previstos - de curto prazo.", "intercambiáveis - específicos.", "intercambiáveis - tempestivos.", "mensurados com confiabilidade - tempestivos.", "mensurados com confiabilidade - de curto prazo."], "correta": 1, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: intercambiáveis - específicos."}, {"id": "SM0087", "banca": "FGV - TJ (TRF 1ª Região)/TRF 1/Apoio Especializado/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Considerando-se os preceitos do CPC 16 – Estoques, em um período de aumento de preços, os métodos de controle de estoque que tendem aresultar em um maior lucro bruto e em um maior estoque final são, respectivamente:", "alternativas": ["PEPS e PEPS;", "PEPS e média ponderada;", "PEPS e UEPS;", "UEPS e PEPS;", "UEPS e média móvel."], "correta": 0, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: PEPS e PEPS;"}, {"id": "SM0088", "banca": "FGV - ATRFB/SRFB/Geral/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Na contabilização do estoque de uma entidade do setor industrial, os gastos com armazenamento foram incluídos no valor dos estoques,reconhecidos no ativo. Em relação a esses gastos, pode-se afirmar que", "alternativas": ["foram pagos à vista.", "seu montante é considerado material, frente ao custo das mercadorias.", "foram incorridos para trazer os estoques à sua condição e localização atuais.", "foram necessários ao processo produtivo entre uma e outra fase de produção.", "deverão ser amortizados mensalmente, com base na vida útil estimada do estoque."], "correta": 3, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: foram necessários ao processo produtivo entre uma e outra fase de produção."}, {"id": "SM0089", "banca": "FGV - AGC (EPE)/EPE/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma instituição realiza operações de câmbio com autorização do Banco Central do Brasil. Para efeito da contribuição para o Programa de Integração Social (PIS) e para a Contribuição para o Financiamento da Seguridade Social (COFINS), receitabruta é a diferença positiva entre", "alternativas": ["o preço de venda e o preço de compra da moeda estrangeira.", "a cotação média mensal e o preço de compra da moeda estrangeira.", "o preço de venda e a cotação média mensal da moeda estrangeira.", "o preço de venda e a cotação da moeda estrangeira em 31 de dezembro do ano anterior.", "a cotação média mensal e a cotação da moeda estrangeira em 31 de dezembro do ano anterior."], "correta": 0, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: o preço de venda e o preço de compra da moeda estrangeira."}, {"id": "SM0090", "banca": "FGV - Ana TI (DATAPREV)/DATAPREV/Gestão Econômico-Financeira/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "A Demonstração do Resultado do Exercício (DRE) é o relatório contábil que apura se a empresa obteve lucro ou prejuízo ao final de cada exercíciosocial. A diferença entre a Venda de Mercadorias e o Custo da Mercadoria Vendida, desconsiderando as despesas administrativas, de vendas efinanceiras, é o lucro", "alternativas": ["real.", "bruto.", "presumido.", "fiscal.", "tributário."], "correta": 1, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: bruto."}, {"id": "SM0091", "banca": "FGV - Ana TI (DATAPREV)/DATAPREV/Gestão Econômico-Financeira/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "As noções básicas de contabilidade envolvem o registro, a classificação e a análise das transações financeiras de uma organização, fornecendoinformações essenciais para a tomada de decisões econômicas e garantindo a transparência e a conformidade com normas contábeis. A principalfunção da contabilidade é", "alternativas": ["auxiliar na tomada de decisões e atender exclusivamente às exigências do governo.", "registrar apenas transações financeiras de pequeno porte.", "fornecer informações úteis para a tomada de decisões e registrar movimentações mensuráveis em relatórios.", "ajudar as empresas a evitarem o pagamento de impostos.", "gerar relatórios financeiros apenas para análise dos acionistas."], "correta": 2, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: fornecer informações úteis para a tomada de decisões e registrar movimentações mensuráveis em relatórios."}, {"id": "SM0092", "banca": "FGV - Ana Geo (CPRM)/CPRM/Contabilidade/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em relação à aplicação das características qualitativas de informações financeiras úteis, é correto afirmar que, em determinas circunstâncias, podeser útil uma informação que é", "alternativas": ["tempestiva, mas não neutra.", "verificável, mas não completa.", "relevante, mas não comparável.", "material, mas não representação fidedigna.", "compreensível, mas não isenta de erros materiais."], "correta": 2, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: relevante, mas não comparável."}, {"id": "SM0093", "banca": "FGV - FTrib (Pref Caraguatatuba)/Pref Caraguatatuba/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "O documento de registro auxiliar, utilizado em contabilidade, no qual os registros contábeis são organizados por conta e, dentro de cada conta,mostrados necessariamente em ordem cronológica, é denominado", "alternativas": ["escritura.", "livro diário.", "balanço contábil.", "livro-razão.", "balanço patrimonial."], "correta": 3, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: livro-razão."}, {"id": "SM0094", "banca": "FGV - Ana GM (Pref SJC)/Pref SJC/Ciências Contábeis/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma sociedade empresária costumava controlar o seu estoque por meio de contagem física, que acontecia no último dia de cada trimestre. Em2025, a sociedade empresária implantou um sistema informatizado e decidiu começar a controlar o estoque de modo contínuo, efetuando o respectivocontrole contábil a cada transação relacionada ao estoque. Os métodos de controle de estoque antes e depois da mudança, foram, respectivamente,", "alternativas": ["PEPS e UEPS.", "PEPS e custo médio.", "custo médio e PEPS.", "periódico e permanente.", "permanente e periódico."], "correta": 3, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: periódico e permanente."}, {"id": "SM0095", "banca": "FGV - ATRFB/SRFB/Geral/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "O custo dos estoques de bens ou serviços produzidos e segregados para projetos específicos deve ser atribuído pelo uso", "alternativas": ["do custo médio ponderado fixo.", "do custo médio ponderado móvel.", "do último que entra, primeiro que sai.", "do primeiro que entra, primeiro que sai.", "da identificação específica dos custos individuais."], "correta": 4, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: da identificação específica dos custos individuais."}, {"id": "SM0096", "banca": "FGV - Ana GM (Pref SJC)/Pref SJC/Ciências Contábeis/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma loja vende uma grande quantidade de eletrodomésticos. O controle é feito apenas por meio de contagem física, realizada por um de seusfuncionários, no último dia útil de cada mês. A loja utiliza inventário", "alternativas": ["periódico.", "de varejo.", "permanente.", "de identificação específica.", "primeiro que entra, primeiro que sai."], "correta": 0, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: periódico."}, {"id": "SM0097", "banca": "FGV - AJ (TJ SE)/TJ SE/Contabilidade/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma empresa comercial decidiu mudar seu método de avaliação de estoque de \"PEPS\" para \"UEPS\" em um período de alta de custos. Nesse sentido,considerando-se as informações apresentadas, o resultado da mudança no estoque final e no lucro líquido são:", "alternativas": ["mesmo valor do estoque final e aumento do lucro líquido;", "aumento do estoque final e diminuição do lucro líquido;", "diminuição do estoque final e aumento do lucro líquido;", "aumento do estoque final e aumento do lucro líquido;", "diminuição do estoque final e diminuição do lucro líquido."], "correta": 4, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: diminuição do estoque final e diminuição do lucro líquido."}, {"id": "SM0098", "banca": "FGV - Tec (Pref Caraguatatuba)/Pref Caraguatatuba/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em 31/12/2022, uma entidade que prestava serviços de consultoria apresentava o seguinte balanço patrimonial: Ativo Circulante Patrimônio Líquido Disponibilidades Total 80.000 80.000 Capital Social Total 80.000 80.000 Em 01/01/2023, ela adquiriu uma moto, para agilizar as entregas de documentos que são necessários ao trabalho por R$30.000. O valor foi pago emmarço de 2023. Assinale a opção que indica os elementos contábeis debitados e creditados, respectivamente, em 01/01/2023, no momento da compra.", "alternativas": ["Ativo e Passivo.", "Ativo e Ativo.", "Ativo e Patrimônio Líquido.", "Passivo e Patrimônio Líquido.", "Patrimônio Líquido e Passivo."], "correta": 0, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: Ativo e Passivo."}, {"id": "SM0099", "banca": "FGV - Ana Leg (ALEP)/ALEP/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "A Cia Beauty vende roupas. Em 2023, o salário mensal de seus vendedores era de R$300.000. Em dezembro, a loja contratou vendedoresterceirizados. O salário mensal destes era de R$100.000. Assinale a opção que indica a classificação das despesas com os salários dos vendedores contratados e com os salários dos vendedores terceirizados,respectivamente, na Demonstração do Resultado do Exercício da loja.", "alternativas": ["Despesas de vendas; outras despesas.", "Despesas de vendas; despesa de vendas.", "Despesas de vendas; despesa administrativas.", "Despesas administrativas; despesas de vendas.", "Despesas administrativas, despesas administrativas."], "correta": 1, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: Despesas de vendas; despesa de vendas."}, {"id": "SM0100", "banca": "FGV - AJ TRT24/TRT 24/Administrativa/Contabilidade/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em 31/12/2022, uma sociedade empresária apresentava os seguintes saldos em seu balanço patrimonial: Disponibilidades: R$100.000,00. Patrimônio Líquido: R$100.000,00. Em 01/01/2023, essa sociedade empresária pagou, antecipadamente, o aluguel de três anos de seu escritório. A sociedade empresária utilizava, internamente, o regime de caixa. Em 2024, ela decidiu utilizar o regime de competência, apenas. Ao reapresentar o balanço patrimonial corrigido de 31/12/2023, assinale a opção que indica um impacto que pode ser observado pela mudança deregime.", "alternativas": ["Aumento do ativo e do passivo.", "Diminuição do ativo e do passivo.", "Aumento do ativo e do patrimônio líquido.", "Diminuição do passivo e aumento no patrimônio líquido.", "Aumento do passivo e diminuição no patrimônio líquido."], "correta": 2, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: Aumento do ativo e do patrimônio líquido."}];
const premios=[100,200,300,500,1000,2000,4000,8000,16000,32000,64000,125000,250000,500000,1000000];
let perguntas=[],indice=0,premioGanho=0,premioGarantido=0,q=null,respondeu=false,usouP=false,usouE=false,usouU=false;
function tela(id){document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));document.getElementById(id).classList.add("ativa")}
function emb(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function din(v){return "R$ "+v.toLocaleString("pt-BR")}
function prep(q){let pares=q.alternativas.map((texto,idx)=>({texto,idx})).filter(p=>p.texto);emb(pares);let n={...q};n.alternativas=pares.map(p=>p.texto);n.correta=pares.findIndex(p=>p.idx===q.correta);if(n.correta<0)n.correta=0;return n}
function iniciar(){perguntas=emb([...bancoQuestoes]).slice(0,15).map(prep);indice=0;premioGanho=0;premioGarantido=0;usouP=false;usouE=false;usouU=false;document.getElementById("p").disabled=false;document.getElementById("e").disabled=false;document.getElementById("u").disabled=false;montarEscada();tela("jogo");mostrar()}
function montarEscada(){return}
function atualizaEscada(){return}}
function mostrar(){respondeu=false;q=perguntas[indice];document.getElementById("feedback").classList.remove("visivel");document.getElementById("feedback").innerHTML="";document.getElementById("nivel").innerHTML=(indice+1)+" / 15";document.getElementById("premio").innerHTML=din(premios[indice]);var pd=document.getElementById("premioDireita");if(pd)pd.innerHTML=din(premios[indice]);document.getElementById("meta").innerHTML=(q.banca||"FGV/CFC")+" • "+(q.assunto||"CFC");document.getElementById("pergunta").innerHTML=q.enunciado;document.getElementById("pergunta").scrollTop=0;let h="";q.alternativas.forEach((a,i)=>h+=`<button class="alt bloco" id="op${i}" onclick="resp(${i})"><span class="num">${i+1}</span>${a}</button>`);document.getElementById("alternativas").innerHTML=h;atualizaEscada()}
function feedback(t){let f=document.getElementById("feedback");f.innerHTML=t;f.classList.add("visivel")}
function resp(i){if(respondeu)return;respondeu=true;let b=document.querySelectorAll(".alt");b.forEach(x=>x.disabled=true);if(i===q.correta){b[i].classList.add("correta");premioGanho=premios[indice];if(indice===4)premioGarantido=premios[4];if(indice===9)premioGarantido=premios[9];feedback("✅ CORRETO!<br>"+(q.comentario||""));setTimeout(()=>{indice++;indice>=15?fim("ganhou"):mostrar()},2600)}else{b[i].classList.add("errada");b[q.correta].classList.add("correta");feedback("❌ ERRADO!<br>"+(q.comentario||""));setTimeout(()=>fim("errou"),3600)}}
function eliminarDuas(){if(usouE||respondeu)return;usouE=true;document.getElementById("e").disabled=true;let err=[];q.alternativas.forEach((a,i)=>{if(i!==q.correta)err.push(i)});emb(err).slice(0,2).forEach(i=>{let b=document.getElementById("op"+i);if(b){b.disabled=true;b.classList.add("eliminada")}})}
function pular(){if(usouP)return;usouP=true;document.getElementById("p").disabled=true;indice++;indice>=15?fim("parou"):mostrar()}
function universitarios(){if(usouU||respondeu)return;usouU=true;document.getElementById("u").disabled=true;feedback("👥 Os universitários acham que a resposta é a alternativa <strong>"+(q.correta+1)+"</strong>.")}
function parar(){fim("parou")}
function fim(tipo){tela("fim");if(tipo==="ganhou"){document.getElementById("tituloFim").innerHTML="🏆 VOCÊ GANHOU!";document.getElementById("textoFim").innerHTML="Parabéns! Você concluiu o Show do Milhão CFC.";document.getElementById("premioFim").innerHTML=din(1000000)}if(tipo==="errou"){document.getElementById("tituloFim").innerHTML="❌ QUE PENA!";document.getElementById("textoFim").innerHTML="Você errou. Prêmio garantido:";document.getElementById("premioFim").innerHTML=din(premioGarantido)}if(tipo==="parou"){document.getElementById("tituloFim").innerHTML="🛑 VOCÊ PAROU!";document.getElementById("textoFim").innerHTML="Você decidiu parar e levar:";document.getElementById("premioFim").innerHTML=din(premioGanho)}}
function reiniciar(){tela("inicio")}
</script>
