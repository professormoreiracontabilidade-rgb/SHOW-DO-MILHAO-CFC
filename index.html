.correta{background:linear-gradient(180deg,#19a84b,#075c25)!important;border-color:#40ff7d!important}.errada{background:linear-gradient(180deg,#444,#111)!important;border-color:#888!important}.eliminada{opacity:.25!important;text-decoration:line-through}

<script>
const bancoQuestoes = [{"id": "SM0001", "banca": "FGV - TDP (DPE RO)/DPE RO/Técnico Administrativo/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "O Balanço Patrimonial é uma ferramenta fundamental para a análise da saúde financeira de uma empresa, apresentando seus bens, direitos eobrigações de forma estruturada. A fórmula básica do Balanço Patrimonial é:", "alternativas": ["Ativo = Passivo + Patrimônio Líquido.", "Ativo = Passivo – Patrimônio líquido.", "Ativo = Patrimônio Líquido – Passivo.", "Patrimônio Líquido = Passivo X Ativo.", "Patrimônio Líquido = Ativo / Passivo."], "correta": 0, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: Ativo = Passivo + Patrimônio Líquido."}, {"id": "SM0002", "banca": "FGV - Tec Leg (ALEP)/ALEP/Técnico em Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, o patrimônio líquido de uma entidade representa aparticipação residual", "alternativas": ["nos ativos após a dedução de todos os seus passivos.", "nos ativos após a dedução de todas as suas despesas.", "nas receitas após a dedução de todos os seus ativos.", "nos passivos após a dedução de todas as suas despesas.", "nas receitas após a dedução de todas as suas despesas."], "correta": 0, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: nos ativos após a dedução de todos os seus passivos."}, {"id": "SM0003", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "A NBC TG ESTRUTURA CONCEITUAL descreve uma série de conceitos utilizados para a elaboração de relatórios financeiros para fins gerais.Relacione cada elemento a seguir com sua correta definição segundo a Estrutura Conceitual. Elemento Definição a. Despesa b. Patrimônio Líquido c. Receita I. Aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio líquido. II. Reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio líquido. III. Participação residual nos ativos da entidade após a dedução de todos os seus passivos. Os elementos a, b e c correspondem, respectivamente, às definições", "alternativas": ["II – III – I.", "I – III – II.", "II – I – III.", "I – II – III."], "correta": 0, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: II – III – I."}, {"id": "SM0004", "banca": "FGV - Bach (CFC)/CFC/2º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "A NBC TG ESTRUTURA CONCEITUAL estabelece os conceitos dos elementos das demonstrações contábeis. Com base nessa norma, avalie asafirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. ( ) Ativo é um recurso econômico presente de propriedade da entidade como resultado de eventos passados. ( ) Passivo é uma obrigação futura da entidade de transferir um recurso econômico como resultado de eventos passados. ( ) Receitas são aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio líquido, exceto aqueles referentes acontribuições de detentores de direitos sobre o patrimônio. ( ) Despesas são reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio líquido, exceto aqueles referentes adistribuições aos detentores de direitos sobre o patrimônio. As afirmativas são, respectivamente,", "alternativas": ["F – F – V – V.", "F – V – F – V.", "V – F – V – F.", "V – V – F – F."], "correta": 0, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: F – F – V – V."}, {"id": "SM0005", "banca": "FGV - AGAS (FHEMIG)/FHEMIG/Contador/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, entre as finalidades da Estrutura Conceitualestá a de auxiliar o desenvolvimento das normas internacionais de contabilidade para que tenham base em conceitos consistentes. Quando um pronunciamento possui requisitos que divergem de aspectos da Estrutura Conceitual, deve-se", "alternativas": ["seguir os requisitos da Estrutura Conceitual, em detrimento ao Pronunciamento.", "escolher quais requisitos deseja seguir e explicar a escolha em notas explicativas.", "seguir os requisitos do Pronunciamento específico, em detrimento da Estrutura Conceitual.", "analisar as divergências com o auditor independente e definir o tratamento aplicável, de acordo com o objetivo da administração.", "apresentar, simultaneamente, uma demonstração contábil de acordo com os requisitos do Pronunciamento e outra de acordo com os requisitosda Estrutura Conceitual."], "correta": 2, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: seguir os requisitos do Pronunciamento específico, em detrimento da Estrutura Conceitual."}, {"id": "SM0006", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, as demonstrações contábeis consolidadasfornecem informações sobre os ativos, passivos, patrimônio líquido, receitas e despesas", "alternativas": ["apenas das controladas.", "apenas da controladora.", "da controladora e de suas controladas, como entidades independentes.", "da controladora e de suas controladas, como uma única entidade que reporta."], "correta": 3, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: da controladora e de suas controladas, como uma única entidade que reporta."}, {"id": "SM0007", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, patrimônio líquido é a participação nosativos da entidade após", "alternativas": ["a dedução de seus passivos.", "a dedução de suas despesas.", "o acréscimo de suas receitas.", "o acréscimo de seus passivos."], "correta": 0, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: a dedução de seus passivos."}, {"id": "SM0008", "banca": "FGV - Tec NS (TJ MS)/TJ MS/Analista Técnico-Contábil/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "O entendimento efetivo de conceitos a partir das normas e dos pronunciamentos contábeis é imprescindível para que as informações sejamrelevantes e representem fidedignamente o reconhecimento e a mensuração de ativos, passivos, patrimônio líquido, receitas e despesas da entidade. Em se tratando dos preceitos das normas e dos pronunciamentos contábeis, é correto afirmar que:", "alternativas": ["a neutralidade é inconsistente com o exercício da prudência;", "representação fidedigna significa representação precisa em todos os aspectos;", "determinados pronunciamentos podem conter requisitos assimétricos, como, por exemplo, provisões e ativos contingentes;", "prudência significa que ativos e receitas devem ser superavaliados e passivos e despesas devem ser subavaliados;", "informações neutras significam informações sem nenhum propósito ou sem nenhuma influência sobre o comportamento."], "correta": 2, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: determinados pronunciamentos podem conter requisitos assimétricos, como, por exemplo, provisões e ativos contingentes;"}, {"id": "SM0009", "banca": "FGV - Ana Leg (ALETO)/ALETO/Ciências Contábeis/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em fevereiro de 2024, uma entidade contratou um motorista para realizar as entregas de seus produtos aos clientes. O salário mensal do motorista épago sempre no dia 05 do mês posterior ao mês trabalhado. O motorista iniciou suas atividades em março. Assinale a opção que indica as variações nos saldos dos elementos patrimoniais na equação patrimonial básica em 31/03/2024.", "alternativas": ["Aumento no ativo e aumento no passivo.", "Diminuição no ativo e diminuição no passivo.", "Aumento no passivo e diminuição no patrimônio líquido.", "Diminuição no ativo e diminuição no patrimônio líquido.", "Diminuição no passivo e diminuição no patrimônio líquido."], "correta": 2, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: Aumento no passivo e diminuição no patrimônio líquido."}, {"id": "SM0010", "banca": "FGV - AGP (Pref Vitória)/Pref Vitória/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, o custo histórico de um ativo é ajustado ao longo dotempo para refletir, quando aplicável, certas condições. Assinale a opção que não reflete uma dessas condições.", "alternativas": ["A integralização do capital social, com reservas de lucros, que havia sido subscrito.", "Os pagamentos recebidos que extinguem a totalidade ou parte do ativo.", "O consumo da totalidade ou parte do recurso econômico que constitui o ativo.", "A provisão de juros para refletir componentes de financiamento do ativo.", "O efeito de eventos que fazem com que a totalidade ou parte do custo histórico do ativo não seja mais recuperável."], "correta": 0, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: A integralização do capital social, com reservas de lucros, que havia sido subscrito."}, {"id": "SM0011", "banca": "FGV - AGP (Pref Vitória)/Pref Vitória/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Na Demonstração do Resultado do Exercício, após calculado o Resultado Bruto, são apresentadas as despesas necessárias ao desenvolvimento dasatividades da empresa e outras receitas complementares ao negócio e segregadas por subtotais, conforme a sua função. Assinale a opção que não indica uma dessas despesas.", "alternativas": ["Despesas com vendas.", "Despesas gerais e administrativas.", "Despesas com juros de capital próprio.", "Outras despesas e receitas operacionais.", "Despesas financeiras deduzidas das receitas financeiras."], "correta": 2, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: Despesas com juros de capital próprio."}, {"id": "SM0012", "banca": "FGV - ACE (TCE RR)/TCE RR/Ciências Contábeis/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a equação fundamental do patrimônio, um aumento em uma conta do ativo pode ter como contrapartida uma diminuição", "alternativas": ["no ativo, apenas.", "no patrimônio líquido, apenas.", "no ativo e no passivo.", "no ativo e no patrimônio líquido.", "no passivo e no patrimônio líquido."], "correta": 0, "comentario": "A equação patrimonial básica é: Ativo = Passivo + Patrimônio Líquido. Portanto, a resposta correta é: no ativo, apenas."}, {"id": "SM0013", "banca": "FGV - AJ (TJ RN)/TJ RN/Administrativa/Contabilidade/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "A comunicação efetiva de informações nas demonstrações contábeis as torna mais relevantes e contribui para uma representação fidedigna deativos, passivos, patrimônio líquido, receitas e despesas da entidade. Em se tratando dos preceitos das normas CPC 00 e CPC 26, é correto afirmar que:", "alternativas": ["a agregação torna as informações mais úteis ao resumir grande quantidade de detalhes. Contudo, deve-se observar um limite de 10%, de modoque as informações relevantes não sejam obscurecidas;", "a entidade deve apresentar separadamente nas demonstrações contábeis cada classe material de itens semelhantes que ultrapassem o limite de10%;", "a entidade não precisa fornecer uma divulgação específica, requerida por Pronunciamento Técnico, Interpretação ou Orientação do CPC, se ainformação resultante da divulgação não for material;", "a comunicação efetiva de informações nas demonstrações contábeis requer concentrar-se em regras e objetivos de divulgação e apresentaçãoem vez de concentrar-se em princípios;", "os relatórios financeiros para fins gerais fornecem todas as informações de que necessitam investidores, credores por empréstimos e outroscredores, existentes e potenciais."], "correta": 2, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: a entidade não precisa fornecer uma divulgação específica, requerida por Pronunciamento Técnico, Interpretação ou Orientação do CPC, se ainformação resultante da divulgação não for material;"}, {"id": "SM0014", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com o conceito de manutenção de capital financeiro, o lucro é auferido somente se o montante financeiro (ou dinheiro) dos ativos líquidosno final do período exceder o montante financeiro (ou dinheiro) dos ativos líquidos no início do período, após excluir", "alternativas": ["compra e venda de ativos fixos durante o período.", "distribuições para, e contribuições de, sócios durante o período.", "reconhecimento contábil de receitas e de despesas durante o período.", "recebimento de receitas e pagamentos de despesas durante o período."], "correta": 1, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: distribuições para, e contribuições de, sócios durante o período."}, {"id": "SM0015", "banca": "FGV - Bach (CFC)/CFC/2º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "A NBC TG Estrutura Conceitual – ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO indica o conceito financeiro e o conceito físico de capital.De acordo com a norma, a seleção do conceito apropriado de capital pela entidade deve ser baseada", "alternativas": ["na forma jurídica dos atos e fatos contábeis.", "na essência econômica dos atos e fatos contábeis.", "nas determinações das entidades reguladoras.", "nas necessidades dos usuários de suas demonstrações contábeis."], "correta": 3, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: nas necessidades dos usuários de suas demonstrações contábeis."}, {"id": "SM0016", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Conforme a NBC TG – ESTRUTURA CONCEITUAL, uma Receita reflete aumento nos ativos, ou redução nos passivos, que resultam em aumentos nopatrimônio líquido, exceto aqueles referentes a contribuições de detentores de direitos sobre o patrimônio. Avalie se são reconhecidos como Receita, nesse contexto, os seguintes itens: I. Ganho de aplicação financeira.II. Transferência de estoques a clientes.III. Ganho na venda de imobilizado.IV. Entrada de recursos pela emissão/venda de debêntures.V. Entrada de recursos pela integralização do capital social.VI. Ganho na venda de ações em tesouraria. São considerados receitas os itens", "alternativas": ["IV, V e VI.", "II, III e VI.", "I, III e IV.", "I, II e III."], "correta": 3, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: I, II e III."}, {"id": "SM0017", "banca": "FGV - AJ (TJ RR)/TJ RR/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em 2023, uma entidade realizou transações com instrumentos financeiros derivativos, que foram consideradas complexas. A entidade optou por não incluir essas transações em suas demonstrações contábeis, de modo a tornar mais fácil a compreensão das informaçõescontidas em suas demonstrações. Em relação à aplicação direta das características qualitativas das informações financeiras úteis, é correto afirmar que as demonstrações contábeis", "alternativas": ["estão de acordo com a relevância.", "estão de acordo com a prudência.", "não estão de acordo com a tempestividade.", "não estão de acordo com a representação fidedigna.", "estão de acordo com a capacidade de verificação."], "correta": 3, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: não estão de acordo com a representação fidedigna."}, {"id": "SM0018", "banca": "FGV - Cont (CGM RJ)/Pref RJ/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "O conceito de prudência está presente na Estrutura Conceitual. Nota-se que ativos e receitas não devem estar superavaliados, da mesma forma quepassivos e despesas não devem estar subavaliados. Nesse sentido, o conceito se aplica para a situação de maior incerteza para a mensuração de um(a):", "alternativas": ["mercadoria para estoque;", "empréstimo bancário pré-fixado;", "aplicação financeira pré-fixada;", "estimativa de provisão judicial;", "ativo imobilizado."], "correta": 3, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: estimativa de provisão judicial;"}, {"id": "SM0019", "banca": "FGV - Ana Prev (MACAEPREV)/MACAEPREV/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Ao realizar a análise horizontal da Demonstração do Resultado do Exercício da Cia Bela em 31/12/2022 e em 31/12/2023, um analista constatou queo lucro bruto aumentou, enquanto a receita de vendas diminuiu. Assinale a opção que indica um fato que pode ter acontecido em 2023 para justificar tais variações.", "alternativas": ["Uma parte das mercadorias vendidas foi devolvida.", "Uma despesa reconhecida no ano anterior foi revertida.", "As despesas operacionais diminuíram ainda mais do que a receita de vendas.", "As receitas financeiras aumentaram ainda mais do que as receitas de vendas.", "O custo das mercadorias vendidas diminuiu ainda mais do que a receita de vendas."], "correta": 4, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: O custo das mercadorias vendidas diminuiu ainda mais do que a receita de vendas."}, {"id": "SM0020", "banca": "FGV - Bach (CFC)/CFC/2º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, para ajudar os usuários dasdemonstrações contábeis a identificar e avaliar mudanças e tendências, as demonstrações contábeis", "alternativas": ["são elaboradas com base na forma jurídica, em detrimento da essência das transações.", "restringem a utilização de estimativas a casos em que poderá haver perdas financeiras do usuário.", "incluem, apenas, informações que podem ser compreendidas, também, por usuários com pouco conhecimento das atividades comerciais eeconômicas, sem auxílio de consultores.", "fornecem informações comparativas de, pelo menos, um período de relatório anterior. 21) 22) 23) 24)"], "correta": 3, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: fornecem informações comparativas de, pelo menos, um período de relatório anterior. 21) 22) 23) 24)"}, {"id": "SM0021", "banca": "FGV - Ana Prev (MACAEPREV)/MACAEPREV/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, a Estrutura Conceitual estabelece a base para normasque reforçam a prestação de contas, reduzindo a lacuna de informações entre", "alternativas": ["o Governo e os órgãos reguladores. 48) 49) 50) 51) 52)", "os órgãos reguladores e os elaboradores das demonstrações contábeis.", "os provedores de capital e as pessoas a quem confiaram o seu dinheiro.", "as entidades que elaboram o relatório financeiro e a auditoria externa.", "a auditoria externa e o público a que se destina o relatório financeiro."], "correta": 2, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: os provedores de capital e as pessoas a quem confiaram o seu dinheiro."}, {"id": "SM0022", "banca": "FGV - Ana Prev (MACAEPREV)/MACAEPREV/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em relação à conceituação dos elementos patrimoniais, assinale V para a afirmativa verdadeira e F para a falsa, de acordo com a Estrutura Conceitual: ( ) Ativo é o recurso econômico presente controlado pela entidade como resultado de eventos passados. ( ) Passivo é a obrigação presente da entidade de transferir um recurso econômico como resultado de eventos passados. ( ) Patrimônio Líquido é a participação residual nas receitas da entidade após a dedução de todas as suas despesas. As afirmativas são, respectivamente,", "alternativas": ["V – V – F.", "F – V – F.", "V – F – F.", "F – F – V.", "V – V – V."], "correta": 0, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: V – V – F."}, {"id": "SM0023", "banca": "FGV - TecGes Admin (ALEMA)/ALEMA/Contador/\"Sem Especialidade\"/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, ativo é um direito que tem o potencial de produzirbenefícios econômicos, presente e controlado pela entidade, como resultado de eventos passados. As opções a seguir indicam exemplos de direitos que representam ativos reconhecidos pela Contabilidade e que correspondem à obrigação de outraparte, à exceção de uma. Assinale-a.", "alternativas": ["Direitos de receber caixa.", "Direitos de receber produtos ou serviços.", "Direitos de influenciar a tomada de decisões estratégicas.", "Direitos de trocar recursos econômicos com outra parte em condições favoráveis.", "Direitos de beneficiar-se de obrigação de outra parte para transferir um recurso econômico se ocorrer evento futuro incerto especificado."], "correta": 2, "comentario": "Ativo é recurso econômico presente controlado pela entidade, com potencial de gerar benefícios econômicos. Portanto, a resposta correta é: Direitos de influenciar a tomada de decisões estratégicas."}, {"id": "SM0024", "banca": "FGV - Tec Leg (ALEP)/ALEP/Técnico em Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Assinale a opção que indica somente despesas classificadas como Despesas Administrativas na Demonstração do Resultado do Exercício de umaentidade.", "alternativas": ["Utilidades e serviços, despesas gerais e de marketing.", "Despesas legais e judiciais, material de escritório e comissão de vendas.", "Honorários da administração, material de escritório e despesas com provisões para contingências.", "Despesas com provisões, legais e judiciais e perdas estimadas com crédito de liquidação duvidosa.", "Comissão de vendas, propaganda e publicidade e perdas estimadas com crédito de liquidação duvidosa."], "correta": 2, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: Honorários da administração, material de escritório e despesas com provisões para contingências."}, {"id": "SM0025", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Considere os seguintes elementos das demonstrações contábeis: I. Ativo.II. Despesa.III. Receita.IV. Passivo.V. Patrimônio Líquido. Desses elementos os que apresentam natureza devedora são:", "alternativas": ["I e II, apenas.", "I e III, apenas.", "II e IV, apenas.", "I, III e V, apenas."], "correta": 0, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: I e II, apenas."}, {"id": "SM0026", "banca": "FGV - AJ TRT24/TRT 24/Administrativa/Contabilidade/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, um ativo, necessariamente,", "alternativas": ["é um bem corpóreo.", "está atrelado a eventos futuros previsíveis.", "tem o potencial de produzir benefícios econômicos.", "representa um direito presente perante os acionistas.", "foi adquirido pela entidade em uma transação com terceiros."], "correta": 2, "comentario": "Ativo é recurso econômico presente controlado pela entidade, com potencial de gerar benefícios econômicos. Portanto, a resposta correta é: tem o potencial de produzir benefícios econômicos."}, {"id": "SM0027", "banca": "FGV - Bach (CFC)/CFC/2º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, com relação às implicações dascaracterísticas qualitativas para a escolha da base de mensuração, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. ( ) Utilizar consistentemente as mesmas bases de mensuração para os mesmos itens, seja de período a período, na entidade que reporta ou em umúnico período para diferentes entidades, prejudica a comparabilidade das demonstrações. ( ) A mudança na base de mensuração pode tornar as demonstrações contábeis menos compreensíveis. Contudo, a mudança pode ser justificadase outros fatores compensarem a redução na compreensibilidade, por exemplo, se a mudança resulta em informações mais relevantes. ( ) A verificação é melhorada utilizando-se bases de mensuração que resultam em avaliações que podem ser independentemente corroboradasdiretamente, por exemplo, observando os preços, ou indiretamente, por exemplo, verificando dados de entrada de modelo. As afirmativas são, respectivamente,", "alternativas": ["V – V – V.", "V – V – F.", "V – F – V.", "F – V – V."], "correta": 3, "comentario": "Comparabilidade permite identificar semelhanças e diferenças entre itens, períodos ou entidades. Portanto, a resposta correta é: F – V – V."}, {"id": "SM0028", "banca": "FGV - Prof NS (SES MT)/SES MT/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "A Estrutura Conceitual para Relatório Financeiro, de acordo com o CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, estabelece a base parapronunciamentos que contribuem para a eficiência econômica. Para os negócios, há redução no custo do capital, por conta", "alternativas": ["da quebra de barreiras entre os países.", "da adoção de normas de auditoria mais rigorosas.", "do uso de linguagem de contabilidade única e confiável.", "do estímulo do intercâmbio entre profissionais da contabilidade."], "correta": 2, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: do uso de linguagem de contabilidade única e confiável."}, {"id": "SM0029", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma entidade deseja reconhecer um ativo em seu balanço patrimonial. A sua mensuração envolve estimativas que estão sujeitas a incertezas. Nesse caso, a entidade", "alternativas": ["não deve reconhecer nem divulgar o ativo, uma vez que não há objetividade em sua mensuração.", "deve reconhecer o ativo sem mencionar a existência de estimativas, uma vez que estas foram elaboradas com zelo e são, portanto, confiáveis. 42) 43) 44) 45) 46) 47)", "não deve reconhecer o ativo, mas evidenciá-lo em notas explicativas, uma vez que não há espaço para incertezas nas demonstrações contábeiselaboradas.", "deve reconhecer o ativo e descrever e explicar as estimativas de forma clara e precisa, uma vez que o uso de estimativas razoáveis é parteessencial da elaboração de informações financeiras."], "correta": 3, "comentario": "A equação patrimonial básica é: Ativo = Passivo + Patrimônio Líquido. Portanto, a resposta correta é: deve reconhecer o ativo e descrever e explicar as estimativas de forma clara e precisa, uma vez que o uso de estimativas razoáveis é parteessencial da elaboração de informações financeiras."}, {"id": "SM0030", "banca": "FGV - TecGes Admin (ALEMA)/ALEMA/Contador/\"Sem Especialidade\"/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos e outroscredores, existentes e potenciais, representam os principais usuários aos quais se destinam os relatórios financeiros para fins gerais. De acordo com a norma, a administração da entidade que reporta não é considerada usuário primário, uma vez que", "alternativas": ["pode obter internamente as informações financeiras de que precisa.", "é a responsável direta pela elaboração destes relatórios financeiros.", "tem necessidades de informação diferentes e possivelmente conflitantes em relação aos demais usuários.", "sua necessidade é mais restrita e específica, enquanto os relatórios financeiros são mais abrangentes.", "trabalha com representações exatas, enquanto os relatórios financeiros baseiam-se em estimativas, julgamentos e modelos."], "correta": 0, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: pode obter internamente as informações financeiras de que precisa."}, {"id": "SM0031", "banca": "FGV - AL (CAM DEP)/CAM DEP/Contador/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, ativo é um recurso econômico presentecontrolado pela entidade como resultado de eventos passados. Um recurso econômico é um direito que tem o potencial de produzir benefícioseconômicos. Para que esse potencial exista", "alternativas": ["o seu valor justo deve ser mensurado com objetividade.", "deve haver uma contrapartida correspondente no passivo.", "precisa ser provável que o direito irá produzir benefícios econômicos futuros.", "precisa ser certo que o direito irá produzir benefícios econômicos futuros.", "é necessário que, em ao menos uma circunstância, o direito irá produzir para a entidade benefícios econômicos além daqueles disponíveis paratodas as outras partes."], "correta": 4, "comentario": "Ativo é recurso econômico presente controlado pela entidade, com potencial de gerar benefícios econômicos. Portanto, a resposta correta é: é necessário que, em ao menos uma circunstância, o direito irá produzir para a entidade benefícios econômicos além daqueles disponíveis paratodas as outras partes."}, {"id": "SM0032", "banca": "FGV - AJ (TJ RR)/TJ RR/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a Estrutura Conceitual para Relatório Financeiro, o Regime de Competência reflete os efeitos de transações e outros eventos ecircunstâncias sobre reivindicações e recursos econômicos da entidade que reporta. Em relação a ele, analise as afirmações a seguir: I. A receita de vendas é contabilizada por ocasião da transferência do controle do produto. II. A despesa de pessoal é reconhecida no mês em que se recebeu tal prestação de serviços. III. A despesa do imposto de renda é registrada no exercício seguinte ao da apuração dos lucros, quando é formalmente declarada. Está correto o que se afirma em", "alternativas": ["I, somente.", "I e II, somente.", "I e III, somente. 111) 112) 113) 114) 115)", "II e III, somente.", "I, II e III"], "correta": 1, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: I e II, somente."}, {"id": "SM0033", "banca": "FGV - TDTND/AMAZUL/Técnico em Contabilidade/2026", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Um analista deseja determinar o saldo das origens de recursos de uma entidade, que são atribuídos ao capital próprio. O analista deve determinar osaldo", "alternativas": ["do ativo.", "das receitas.", "do passivo.", "das despesas.", "do patrimônio líquido."], "correta": 4, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta correta é: do patrimônio líquido."}, {"id": "SM0034", "banca": "FGV - AJ TRT24/TRT 24/Administrativa/Contabilidade/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, o objetivo do relatório financeiro para fins gerais éfornecer informações financeiras sobre a entidade que reporta que sejam úteis para os seus principais usuários na tomada de decisões. Entre estas decisões está", "alternativas": ["reter ou distribuir o resultado obtido.", "expandir ou retrair os negócios perante uma crise.", "aumentar ou manter o preço de venda dos produtos e serviços.", "adotar estratégias agressivas ou conservadoras na gestão do capital circulante.", "comprar, vender ou manter instrumento de patrimônio e de dívida."], "correta": 4, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: comprar, vender ou manter instrumento de patrimônio e de dívida."}, {"id": "SM0035", "banca": "FGV - Bach (CFC)/CFC/2º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, as características qualitativasfundamentais são relevância e representação fidedigna, sendo que, para ser representação fidedigna, a representação deve ser completa, neutra e isentade erros. Uma informação neutra pode", "alternativas": ["ser parcial.", "ser prudente.", "possuir inclinações.", "ser tendenciosa na seleção de informações financeiras."], "correta": 1, "comentario": "A informação relevante é capaz de influenciar decisões, pois possui valor preditivo, confirmatório ou ambos. Portanto, a resposta correta é: ser prudente."}, {"id": "SM0036", "banca": "FGV - Cont (Pref Caraguatatuba)/Pref Caraguatatuba/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "O custo é uma restrição generalizada sobre as informações que podem ser fornecidas pelo relatório financeiro. De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, o relatório de informações financeiras impõe custos, e éimportante que esses custos sejam justificados pelo(s)", "alternativas": ["resultados financeiros deste período.", "resultados operacionais deste período.", "número de horas trabalhadas para elabora-lo.", "número de profissionais envolvidos no processo.", "benefícios de apresentar essas informações."], "correta": 4, "comentario": "O custo é uma restrição: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la. Portanto, a resposta correta é: benefícios de apresentar essas informações."}, {"id": "SM0037", "banca": "FGV - ACE (TCE-GO)/TCE GO/Ciências Contábeis/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, a Estrutura Conceitual estabelece a base parapronunciamentos que contribuem para a eficiência econômica, ajudando os investidores a", "alternativas": ["conhecer talentos globalmente, aprimorando a qualidade de mão de obra.", "identificar oportunidades e riscos em todo o mundo, melhorando a alocação de capital.", "aumentar o conhecimento em relação a seus investimentos, diminuindo o risco de oportunidade.", "receber informações e relatórios com maior velocidade, aumentando a agilidade em suas escolhas.", "melhorar a comunicação com as suas investidas, desenvolvendo um relacionamento mais vantajoso."], "correta": 1, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: identificar oportunidades e riscos em todo o mundo, melhorando a alocação de capital."}, {"id": "SM0038", "banca": "FGV - Prof NS (SES MT)/SES MT/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com o CPC 00 (R2) – Estrutura Conceitual para Relatório Financeiro, as demonstrações contábeis fornecem informações sobre transaçõese outros eventos observados do ponto de vista dos(", "alternativas": ["acionistas minoritários.", "entidade que reporta como um todo.", "usuários, em geral.", "investidores e credores por empréstimos, existentes ou potenciais."], "correta": 2, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: entidade que reporta como um todo."}, {"id": "SM0039", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "O conceito de Capital é adotado pela maioria das entidades na elaboração das Demonstrações Contábeis. A seleção do conceito apropriado deCapital pela entidade deve ser baseada nas necessidades dos seus usuários, principalmente, os preocupados com a manutenção de capital nominalinvestido ou com o poder de compra do capital investido. A manutenção do Capital em que o lucro é auferido somente se o montante dos ativos líquidosno final do período exceder o montante dos ativos líquidos no início do período, após excluir quaisquer distribuições para, e contribuições de, sóciosdurante o período, é a Manutenção do", "alternativas": ["Capital Físico.", "Capital Financeiro.", "Capital Social.", "Capital Integralizado."], "correta": 1, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: Capital Financeiro."}, {"id": "SM0040", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, os principais usuários aos quais se destinam osrelatórios financeiros para fins gerais são representados por", "alternativas": ["empregados, clientes e fornecedores.", "detentores de participação societária e interessados em adquiri-la.", "população em geral, impactada direta e indiretamente pelos relatórios.", "investidores, credores por empréstimos e outros credores, existentes e potenciais."], "correta": 3, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: investidores, credores por empréstimos e outros credores, existentes e potenciais."}, {"id": "SM0041", "banca": "FGV - ATTM (Pref Nova Iguaçu)/Pref Nova Iguaçu/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Os investidores, credores por empréstimos e outros credores existentes e potenciais são considerados os usuários principais, aos quais se destinamrelatórios financeiros para fins gerais. De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, a administração da entidade não é considerada usuárioprincipal, uma vez que", "alternativas": ["tem como foco os relatórios gerenciais.", "apresenta, em geral, alta rotatividade.", "reporta-se diretamente aos diretores da entidade.", "pode obter internamente as informações financeiras de que precisa.", "não representa uma provedora de recursos essenciais para a sobrevivência da entidade."], "correta": 3, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: pode obter internamente as informações financeiras de que precisa."}, {"id": "SM0042", "banca": "FGV - AGP (Pref Vitória)/Pref Vitória/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos, e outroscredores, existentes e potenciais, são os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Em relação às informaçõesfornecidas por estes relatórios aos usuários primários, é correto afirmar que os relatórios", "alternativas": ["fornecem todas as informações de que esses usuários necessitam.", "buscam fornecer todas as informações de que esses usuários necessitam, sendo que nem sempre é possível.", "não fornecem todas as informações de que esses usuários necessitam, no entanto, as normas contábeis estão sendo aprimoradas para que issoaconteça.", "não fornecem e nem podem fornecer todas as informações de que esses usuários necessitam, de modo que eles precisam considerar outrasfontes.", "não fornecem e nem podem fornecer todas as informações de que esses usuários necessitam, de modo que eles precisam tirar as suasconclusões com base no que os relatórios divulgam."], "correta": 3, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: não fornecem e nem podem fornecer todas as informações de que esses usuários necessitam, de modo que eles precisam considerar outrasfontes."}, {"id": "SM0043", "banca": "FGV - Cont (CGM RJ)/Pref RJ/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma empresa atualizou seu sistema contábil. Após a finalização de implementação do novo sistema, o plano de contas não mais segregava ascontas a receber de controladas e coligadas. Nesse caso, a mudança ocorrida afeta a:", "alternativas": ["tempestividade, devido ao atraso na divulgação da informação contábil, prejudicando a sua confiabilidade;", "materialidade, devido à informação ser incompleta e fora dos limites de materialidade e custo;", "consistência, pois a apresentação e a classificação de itens nas demonstrações contábeis devem ser mantidas de um período para outro;", "compensação de valores, pois a entidade deve compensar ativos e passivos ou receitas e despesas para divulgação ao usuário interno;", "uniformidade, pois permite aos usuários identificar e compreender similaridades e diferenças."], "correta": 2, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: consistência, pois a apresentação e a classificação de itens nas demonstrações contábeis devem ser mantidas de um período para outro;"}, {"id": "SM0044", "banca": "FGV - AJ (TJ MT)/TJ MT/Ciências Contábeis/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a redação dada pela Lei nº 11.941/09 em relação à Lei nº 6.404/76, são classificados como ajustes de avaliação patrimonial, ascontrapartidas de aumentos ou diminuições de valor atribuídos a elementos do ativo e do passivo, em decorrência da sua avaliação a valor justo,enquanto não computadas no resultado do exercício em obediência a(o):", "alternativas": ["Regime de competência.", "Essência sobre a forma.", "Premissa da continuidade operacional.", "Característica qualitativa da tempestividade.", "Característica qualitativa da comparabilidade."], "correta": 0, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: Regime de competência."}, {"id": "SM0045", "banca": "FGV - AGP (Pref Vitória)/Pref Vitória/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em relação à divulgação relacionada aos estoques de uma fábrica nas Demonstrações Contábeis, analise as informações a seguir: I. O valor de estoques reconhecido como despesa durante o período. II. O valor total escriturado em estoques e o valor registrado em outras contas apropriadas para a entidade. III. As políticas contábeis adotadas na mensuração dos estoques, incluindo formas e critérios de valoração utilizados. De acordo com a NBC TG 16 (R2) - Estoques, as demonstrações contábeis devem divulgar o que se afirma em", "alternativas": ["I, somente.", "I e II, somente.", "I e III, somente.", "II e III, somente.", "I, II e III."], "correta": 4, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: I, II e III."}, {"id": "SM0046", "banca": "FGV - Ana Geo (CPRM)/CPRM/Contabilidade/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma sociedade empresária possui uma aplicação financeira que é atualizada periodicamente, de acordo com um parâmetro diretamente vinculado aum índice inflacionário. Em determinado ano, a inflação foi de 5%. O reconhecimento do efeito da inflação deve ser apresentado pela sociedade empresária na Demonstração do Resultado junto com", "alternativas": ["as despesas financeiras.", "as despesas operacionais", "as receitas financeiras.", "as outras receitas operacionais.", "os ajustes de avaliação patrimonial."], "correta": 2, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: as receitas financeiras."}, {"id": "SM0047", "banca": "FGV - ADP (DPE RO)/DPE RO/Contábil/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "16) 17) 18) 19) 20) De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o custo é uma restrição generalizada sobre asinformações que podem ser fornecidas pelo relatório financeiro. Em relação a essa restrição, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. ( ) O relatório de informações financeiras impõe custos, e é importante que esses custos sejam justificados pelos benefícios de apresentar essasinformações. ( ) Os fornecedores de informações financeiras gastam a maior parte dos esforços envolvidos na coleta, processamento, verificação edisseminação de informações financeiras, mas, em última instância, os usuários arcam com esses custos na forma de retornos reduzidos. ( ) Os usuários de informações financeiras podem incorrer em custos de análise e interpretação das informações fornecidas. Se as informaçõesnecessárias não são fornecidas, os usuários incorrem em custos de realizar a análise incompleta, sem as devidas informações. As afirmativas são, respectivamente,", "alternativas": ["V – V – V.", "V – V – F.", "V – F – V.", "F – V – V.", "V – F – F."], "correta": 1, "comentario": "O custo é uma restrição: os benefícios da informação devem justificar os custos de produzi-la e utilizá-la. Portanto, a resposta correta é: V – V – F."}, {"id": "SM0048", "banca": "FGV - TDP (DPE RO)/DPE RO/Técnico em Contabilidade/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Um médico é proprietário de uma clínica integrativa. Para avaliar como estão os seus negócios, ele estudou e adquiriu conhecimento relacionado àsatividades comerciais, contábeis e econômicas e começou a revisar e analisar as informações de modo diligente. De acordo com a característica qualitativa da Compreensibilidade, conforme o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para RelatórioFinanceiro, os relatórios financeiros da clínica", "alternativas": ["são elaborados para o médico, uma vez que ele deve pagar impostos sobre o resultado obtido.", "não são elaborados para o médico, uma vez que, como dono, ele pode conseguir as informações que deseja diretamente.", "são elaborados para o médico, uma vez que ele é o proprietário da clínica e, como consequência, interessado em seus resultados.", "são elaborados para o médico, uma vez que ele tem conhecimento das atividades comerciais e econômicas e revisa e analisa as informações demodo diligente.", "não são elaborados para o médico, uma vez que há pessoas na clínica responsáveis pela administração contábil e financeira dos negócios."], "correta": 3, "comentario": "Compreensibilidade exige apresentação clara e organizada, considerando usuários com conhecimento razoável e diligência. Portanto, a resposta correta é: são elaborados para o médico, uma vez que ele tem conhecimento das atividades comerciais e econômicas e revisa e analisa as informações demodo diligente."}, {"id": "SM0049", "banca": "FGV - TDP (DPE RO)/DPE RO/Técnico em Contabilidade/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Leia o fragmento a seguir. “Tempestividade significa disponibilizar informações aos __________ a tempo para que sejam capazes de __________ as suas decisões”. Assinale a alternativa cujos itens completam corretamente as lacunas do fragmento acima, de acordo com o Pronunciamento Técnico CPC 00 (R2) -Estrutura Conceitual para Relatório Financeiro:", "alternativas": ["tomadores de decisões – modificar.", "tomadores de decisões – influenciar.", "administradores da entidade – modificar.", "administradores da entidade – influenciar.", "administradores da entidade – corroborar."], "correta": 1, "comentario": "Tempestividade significa disponibilizar a informação a tempo de influenciar a decisão do usuário. Portanto, a resposta correta é: tomadores de decisões – influenciar."}, {"id": "SM0050", "banca": "FGV - ANL (CM Fortal)/CM Fortaleza/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "25) 26) 27) 28) 29) 30) Após o período contábil, e antes da aprovação a que se referem as demonstrações contábeis, a administração de uma entidade determina quepretende liquidá-la. Nesse caso, a entidade deve elaborar as demonstrações contábeis do período finalizado", "alternativas": ["de modo resumido.", "sem utilizar o pressuposto de continuidade.", "em duas versões, seguindo e não seguindo o pressuposto de continuidade.", "de acordo com o pressuposto de continuidade, com ajustes nas principais contas.", "de acordo com o pressuposto de continuidade e divulgação do fato em notas explicativas."], "correta": 1, "comentario": "Pela continuidade operacional, presume-se que a entidade continuará operando e não pretende nem precisa entrar em liquidação. Portanto, a resposta correta é: sem utilizar o pressuposto de continuidade."}, {"id": "SM0051", "banca": "FGV - Cont (Pref Caraguatatuba)/Pref Caraguatatuba/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a NBC TG 23 (R2) – Políticas Contábeis, Mudança de Estimativa e Retificação de Erro, a menos que for exigida ou resultar eminformação mais relevante, as mesmas políticas contábeis devem ser aplicadas em cada período e de um período para o outro. Isso acontece para possibilitar a seguinte característica qualitativa da informação financeira útil em relação às demonstrações contábeis.", "alternativas": ["Relevância.", "Oportunidade.", "Tempestividade.", "Comparabilidade.", "Compreensibilidade."], "correta": 3, "comentario": "Comparabilidade permite identificar semelhanças e diferenças entre itens, períodos ou entidades. Portanto, a resposta correta é: Comparabilidade."}, {"id": "SM0052", "banca": "FGV - Tec (Pref Caraguatatuba)/Pref Caraguatatuba/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2) Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos eoutros credores, existentes e potenciais, são os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Isso acontece porque muitos deles", "alternativas": ["recebem a maior parte do resultado gerado pela entidade que reporta.", "representam os principais financiadores das entidades que reportam.", "assumem os maiores riscos operacionais ao se relacionarem com a entidade que reporta.", "contratam e remuneram a empresa de auditoria independente responsável pelos relatórios.", "não podem exigir que as entidades que reportam forneçam informações diretamente a eles."], "correta": 4, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: não podem exigir que as entidades que reportam forneçam informações diretamente a eles."}, {"id": "SM0053", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Desreconhecimento é a retirada de parte ou da totalidade de ativo ou passivo reconhecido do balanço patrimonial da entidade. O desreconhecimentonormalmente ocorre quando esse item não atende mais à definição de ativo ou passivo, que expirou, foi consumido, recebido, executado ou transferido. Amáquina utilizada para a produção do principal produto de uma determinada entidade deve ser desreconhecida quando", "alternativas": ["perder todo o potencial de produzir benefícios econômicos para a entidade.", "estiver parcialmente depreciado.", "sofrer perda de valor recuperável.", "estiver sob controle da entidade."], "correta": 0, "comentario": "Ativo é recurso econômico presente controlado pela entidade, com potencial de gerar benefícios econômicos. Portanto, a resposta correta é: perder todo o potencial de produzir benefícios econômicos para a entidade."}, {"id": "SM0054", "banca": "FGV - AGC (EPE)/EPE/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2), a Estrutura Conceitual para Relatório Financeiro contribui para a missão de desenvolverpronunciamentos que tragam aos mercados financeiros", "alternativas": ["arrojamento, eficiência e comparabilidade.", "transparência, comparabilidade e exatidão.", "exatidão, redução de custos e conhecimento.", "prestação de contas, economia e arrojamento.", "transparência, prestação de contas e eficiência."], "correta": 4, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: transparência, prestação de contas e eficiência."}, {"id": "SM0055", "banca": "FGV - Aud CE (TCE-PA)/TCE PA/Administrativa/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma sociedade empresária precisa aumentar o seu saldo em caixa, para pagar as suas despesas operacionais. No entanto, a sociedade empresárianão deseja aumentar as suas despesas, que já estão comprometidas, e nem o seu nível de endividamento. Assinale a opção que indica uma estratégia que atende aos objetivos da sociedade empresária.", "alternativas": ["Pagamento das despesas antecipadas.", "Aumento do capital social em dinheiro.", "Desconto de duplicadas em instituição bancária.", "Solicitação de empréstimo bancário de curto prazo.", "Solicitação de empréstimo bancário de longo prazo."], "correta": 1, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: Aumento do capital social em dinheiro."}, {"id": "SM0056", "banca": "FGV - AL (CAM DEP)/CAM DEP/Consultor Legislativo/Área III/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Assinale a opção que indica um fato em que não há reconhecimento de despesa no mês de janeiro, de acordo com o Regime de Competência.", "alternativas": ["Em 01 de janeiro, uma pessoa paga à vista o plano semestral da academia, com vigência imediata.", "Em 01 de janeiro, uma empresa recebe a última revista de assinatura anual, que havia sido feita no ano anterior.", "Em 01 de janeiro, uma entidade contrata o seguro anual de seus veículos, tendo início a vigência, sendo que o pagamento é realizado em fevereirodo mesmo ano.", "Em 01 de janeiro, uma empresa recebe os uniformes personalizados de seus funcionários, que haviam sido encomendados e pagos no mêsanterior.", "Em 01 de janeiro, uma entidade assina um contrato para recebimento de serviços de consultoria, a serem iniciados no mês de fevereiro, tendopago um sinal."], "correta": 4, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: Em 01 de janeiro, uma entidade assina um contrato para recebimento de serviços de consultoria, a serem iniciados no mês de fevereiro, tendopago um sinal."}, {"id": "SM0057", "banca": "FGV - Ana MPU/MPU/Perito/Contabilidade/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Um perito em contabilidade está analisando a seguinte situação: uma empresa S/A, que tem por objeto social (i) a participação em outrassociedades, comerciais ou civis, nacionais ou estrangeiras, como sócia, acionista ou quotista, (ii) a participação em empreendimentos imobiliários, e (iii) aparticipação, como quotista, em fundos de investimento, recebeu dos sócios um ativo “fertilizantes” como forma de subscrição em bens em um aumentode capital social. Dessa forma, a empresa S/A informou que eventualmente poderá vir a adquirir ou constituir uma subsidiária, a qual hipoteticamentecomercializaria os fertilizantes. Assim, a empresa S/A contabilizou como Estoque o ativo “fertilizantes”. Contudo, a empresa S/A não possui registro juntoao Ministério da Agricultura e Pecuária (MAPA) para comercializar fertilizantes. Considerando-se as informações apresentadas e os preceitos do CPC 16 (R1) Estoques, o perito identificou que o ativo “fertilizantes”:", "alternativas": ["deve ser classificado como Estoque, pois é um bem tangível que a empresa poderá utilizar no futuro;", "deve ser classificado como Estoque, pois pode ser revendido diretamente, ainda que a empresa não possua registro no MAPA;", "deve ser classificado como Estoque, considerando a possibilidade de uma subsidiária futura realizar sua comercialização;", "falha à definição de Estoque, como serem mantidos essencialmente com o propósito de serem negociados ou com a expectativa de que sejamrealizados até doze meses após a data do balanço;", "falha à definição de Estoque, como serem mantidos para venda no curso normal dos negócios ou em processo de produção para venda ou naforma de material a ser consumido no processo de produção."], "correta": 4, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: falha à definição de Estoque, como serem mantidos para venda no curso normal dos negócios ou em processo de produção para venda ou naforma de material a ser consumido no processo de produção."}, {"id": "SM0058", "banca": "FGV - Cont (Nittrans)/Nittrans/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma loja que vendia eletrodomésticos e utilidades para casa deseja avaliar parte de seu estoque, de acordo com o método Primeiro a Entrar ePrimeiro a Sair (PEPS), e o restante de acordo com o método Custo Médio Ponderado. De acordo com o Pronunciamento Técnico CPC 16 (R1)- Estoques, o uso de critérios de valoração diferentes pode se justificar, caso o estoque", "alternativas": ["seja de bens de almoxarifado.", "seja submetido a regras fiscais distintas.", "apresente preços de venda distintos.", "tenha diferentes naturezas ou uso.", "esteja localizado em diferentes localizações geográficas."], "correta": 3, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: tenha diferentes naturezas ou uso."}, {"id": "SM0059", "banca": "FGV - ANL (CM Fortal)/CM Fortaleza/Contador/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma imobiliária constrói e vende apartamentos. Para estimular as vendas, a imobiliária costuma organizar um grande evento de lançamento de seusprédios. O valor gasto com esse evento deve ser contabilizado como", "alternativas": ["ativo circulante, no balanço patrimonial.", "ativo intangível, no balanço patrimonial.", "ativo imobilizado, no balanço patrimonial.", "custo, na demonstração do resultado do exercício.", "despesa operacional, na demonstração do resultado do exercício."], "correta": 4, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: despesa operacional, na demonstração do resultado do exercício."}, {"id": "SM0060", "banca": "FGV - Tec (Nittrans)/Nittrans/Contábil/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a característica qualitativa da verificabilidade, a verificação pode ocorrer de forma direta ou indireta. Assinale a opção que apresenta um exemplo de verificação indireta", "alternativas": ["Contagem de caixa.", "Realização de inventário dos ativos imobilizados em uso.", "Observação de títulos negociáveis e suas cotações de preço.", "Confirmação de que os fatores identificados que influenciaram o desempenho passado estão presentes e relacionados com os efeitosidentificados.", "Verificação do valor contábil do estoque por meio da conferência das entradas e do recálculo do estoque final utilizando o mesmo método demensuração."], "correta": 4, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: Verificação do valor contábil do estoque por meio da conferência das entradas e do recálculo do estoque final utilizando o mesmo método demensuração."}, {"id": "SM0061", "banca": "FGV - Tec (Pref Caraguatatuba)/Pref Caraguatatuba/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma loja compra estoques para revenda, trimestralmente. A loja verificou que a cada trimestre o preço cobrado pelo seu fornecedor aumentava em 2%. Até 2022, a loja avaliava, internamente, o seu estoque de acordo com o método UEPS. Em 2023, a loja passou a avaliar o estoque de acordo com o customédio ponderado móvel. Ao comparar os valores de acordo com os dois métodos, é correto afirmar que, de acordo com o UEPS, o estoque e o custo das mercadorias vendidasparecem, respectivamente,", "alternativas": ["menor e maior.", "maior e menor.", "menor e menor.", "maior e maior.", "igual e menor."], "correta": 0, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: menor e maior."}, {"id": "SM0062", "banca": "FGV - AJ (TJ RR)/TJ RR/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma loja de roupas é localizada em um país que registra inflação de 5% ao mês. A loja avaliava o seu estoque, que tinha rápida rotação, de acordocom o método PEPS. Em 01/01/2023, a loja decidiu passar a avaliar o seu estoque de acordo com o custo médio ponderado móvel sem, inicialmente,retroagir o método nos períodos anteriores, pois os efeitos da mudança foram julgados imateriais. Ao comparar o balanço patrimonial de 31/12/2023, que adota o custo médio ponderado móvel, com o de 31/12/2022, que adota o PEPS, a loja pode ter avisão de que", "alternativas": ["o lucro está maior.", "as vendas aumentaram.", "o ativo circulante está menor.", "o ativo não circulante está maior.", "o passivo não circulante está menor."], "correta": 2, "comentario": "A equação patrimonial básica é: Ativo = Passivo + Patrimônio Líquido. Portanto, a resposta correta é: o ativo circulante está menor."}, {"id": "SM0063", "banca": "FGV - Ana CI (Pref Canaã Carajás)/Pref Canaã Carajás/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a premissa da continuidade operacional, presente na Estrutura Conceitual para Relatório Financeiro, presume-se que a entidade nãotem a intenção e nem a necessidade de", "alternativas": ["mudar a área ou o local de atuação.", "entrar em liquidação ou deixar de negociar.", "substituir as suas estratégias financeiras ou operacionais.", "deixar de publicar seus relatórios contábeis ou econômicos.", "continuar operando por tempo indeterminado ou desconhecido."], "correta": 1, "comentario": "Pela continuidade operacional, presume-se que a entidade continuará operando e não pretende nem precisa entrar em liquidação. Portanto, a resposta correta é: entrar em liquidação ou deixar de negociar."}, {"id": "SM0064", "banca": "FGV - AFTM (Pref Macaé)/Pref Macaé/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Analise as transações a seguir: I. Pagamento antecipado da despesa de salários do mês seguinte. II. Recebimento antecipado de receita que será realizada em 3 meses. III. Venda de estoque com lucro, para recebimento em 9 meses. Resultam em mudança no saldo do ativo circulante, o que se apresenta em", "alternativas": ["I, somente.", "I e II, somente.", "I e III, somente.", "II e III, somente.", "I, II e III."], "correta": 3, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: II e III, somente."}, {"id": "SM0065", "banca": "FGV - Ana Leg (ALETO)/ALETO/Ciências Contábeis/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em junho de 2023, uma loja de roupas recebeu uma encomenda para o fornecimento de uniformes a uma empresa de segurança. O pagamento foirecebido em duas parcelas, nos meses de julho e agosto. Em agosto, os uniformes foram entregues. Assinale a opção que indica o(s) mês(es) em que o reconhecimento da receita de acordo com o Regime de Caixa e o Regime de Competência, foi de igualvalor.", "alternativas": ["Junho.", "Julho.", "Agosto.", "Julho e agosto.", "Junho, julho e agosto."], "correta": 0, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: Junho."}, {"id": "SM0066", "banca": "FGV - Tec (Pref Caraguatatuba)/Pref Caraguatatuba/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma entidade usa o Regime de Caixa para contabilizar as suas transações. De acordo com o Regime de Caixa, uma receita deve ser contabilizada de acordo com", "alternativas": ["a assinatura de contrato.", "o acontecimento do fato gerador.", "o ingresso de bens e numerários.", "a transferência dos riscos e benefícios.", "a prestação de serviço ou entrega de produto."], "correta": 2, "comentario": "Receita corresponde a aumentos nos ativos ou reduções nos passivos que aumentam o patrimônio líquido, exceto contribuições dos sócios. Portanto, a resposta correta é: o ingresso de bens e numerários."}, {"id": "SM0067", "banca": "FGV - AGAS (FHEMIG)/FHEMIG/Contador/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Assinale a opção que indica um fato em que o reconhecimento contábil da despesa pelo Regime de Competência acontece antes doreconhecimento pelo Regime de Caixa.", "alternativas": ["Pagamento, em janeiro, de um ano de despesas de aluguel antecipadas.", "Pagamento, em fevereiro, do salário de janeiro de seus funcionários.", "Pagamento, em março, da compra de um veículo realizada em fevereiro.", "Pagamento, em março, da distribuição de lucros do ano anterior aos sócios.", "Pagamento, em abril, de passagem aérea de viagem que irá acontecer em maio."], "correta": 1, "comentario": "Despesa corresponde a reduções nos ativos ou aumentos nos passivos que reduzem o patrimônio líquido, exceto distribuições aos sócios. Portanto, a resposta correta é: Pagamento, em fevereiro, do salário de janeiro de seus funcionários."}, {"id": "SM0068", "banca": "FGV - AJ (TJ MT)/TJ MT/Ciências Contábeis/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Um supermercado utiliza o método do preço de venda a varejo para controle e mensuração dos seus estoques. Desse modo, cada produto tem seu preço de venda básico determinado com um percentual fixo de lucro bruto sobre o custo desses estoques. Foi constatado que, no terceiro trimestre de 2024, as vendas de alguns produtos foram feitas por preço diferente do preço básico. Essa diferença é reconhecida como", "alternativas": ["desconto financeiro.", "desconto comercial.", "receitas financeiras.", "receita de vendas", "outras receitas."], "correta": 1, "comentario": "Em estoques, a banca costuma cobrar reconhecimento, mensuração e efeitos conforme o CPC 16. Portanto, a resposta correta é: desconto comercial."}, {"id": "SM0069", "banca": "FGV - Ana TI (DATAPREV)/DATAPREV/Gestão Econômico-Financeira/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "O Balanço Patrimonial é o principal relatório gerado pela Contabilidade, pois permite avaliar a saúde financeira e econômica da empresa em uma dataespecífica, seja no final do ano ou em outro momento pré- determinado. O conjunto de bens e direitos controlados pela empresa denomina-se", "alternativas": ["passivo.", "capital social.", "leasing.", "ativo.", "capital próprio."], "correta": 3, "comentario": "A equação patrimonial básica é: Ativo = Passivo + Patrimônio Líquido. Portanto, a resposta correta é: ativo."}, {"id": "SM0070", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Um supermercado funciona na região sul do país. Em maio de 2024, devido às fortes chuvas, o supermercado perdeu todo o seu estoque. Nasdemonstrações contábeis mensais, em 31/05/24, o supermercado optou por baixar todo o estoque, mesmo sem ter recebido um laudo oficial, de modo atornar as demonstrações mais úteis aos tomadores de decisões. A informação apresenta a seguinte característica qualitativa:", "alternativas": ["neutralidade.", "materialidade.", "verificabilidade.", "tempestividade."], "correta": 3, "comentario": "Tempestividade significa disponibilizar a informação a tempo de influenciar a decisão do usuário. Portanto, a resposta correta é: tempestividade."}, {"id": "SM0071", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "11) 12) 13) 14) 15) Segundo a NBC TG ESTRUTURA CONCEITUAL, para a representação dos relatórios financeiros ser fidedigna ela precisa ser", "alternativas": ["completa, neutra e isenta de erros.", "confiável, tempestiva e com erros mínimos.", "tempestiva, útil e comparável.", "consistente, completa e compreensível."], "correta": 0, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: completa, neutra e isenta de erros."}, {"id": "SM0072", "banca": "FGV - CInt (Pref Caraguatatuba)/Pref Caraguatatuba/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em relação à estrutura conceitual para Relatório Financeiro da contabilidade e às suas implicações, pode-se afirmar que, nas demonstraçõescontábeis, as informações financeiras úteis devem", "alternativas": ["ser corrigidas pela inflação.", "utilizar sempre os mesmos padrões.", "ser produzidas e apresentadas sem custos.", "ser disponibilizadas aos usuários no momento em que os eventos econômicos ocorrem.", "representar de forma fidedigna a essência dos fenômenos que pretendem representar. 31) 32) 33) 34) 35) 36)"], "correta": 4, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: representar de forma fidedigna a essência dos fenômenos que pretendem representar. 31) 32) 33) 34) 35) 36)"}, {"id": "SM0073", "banca": "FGV - Aud CE (TCE-PA)/TCE PA/Fiscalização/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma entidade do setor público elabora anualmente informações sobre a sua situação patrimonial e o seu desempenho. Em 2023, ela elaborou as informações de maneira diferenciada, de modo que não foi possível aos usuários identificar semelhanças e diferenças entre asinformações de 2023 e de 2022 e nem tomar decisões com base nelas. Assinale a opção que indica a característica qualitativa que não foi diretamente atendida no período:", "alternativas": ["Materialidade.", "Tempestividade.", "Verificabilidade.", "Comparabilidade.", "Compreensibilidade."], "correta": 3, "comentario": "Comparabilidade permite identificar semelhanças e diferenças entre itens, períodos ou entidades. Portanto, a resposta correta é: Comparabilidade."}, {"id": "SM0074", "banca": "FGV - Aud CE (TCE-PA)/TCE PA/Administrativa/Contabilidade/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "De acordo com a característica qualitativa da relevância, as informações financeiras e não financeiras são relevantes caso sejam capazes deinfluenciar significativamente o cumprimento dos objetivos da elaboração e da divulgação da informação contábil. 37) 38) 39) 40) 41) Para que a informação exerça essa influência, deve", "alternativas": ["ser inédita aos usuários.", "ser apresentada de maneira clara e sucinta.", "ter valor confirmatório, preditivo ou ambos.", "estar disponível no momento em que acontece.", "ser considerada pelos usuários na tomada de decisão."], "correta": 2, "comentario": "A informação relevante é capaz de influenciar decisões, pois possui valor preditivo, confirmatório ou ambos. Portanto, a resposta correta é: ter valor confirmatório, preditivo ou ambos."}, {"id": "SM0075", "banca": "FGV - Bach (CFC)/CFC/1º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em 2023, uma entidade desreconheceu um ativo de seu balanço patrimonial. Assinale a opção que indica uma possível causa para o desreconhecimento.", "alternativas": ["A entidade decidiu utilizar um terreno para finalidade diferente.", "A entidade perdeu o controle de um imóvel, por meio de decisão judicial.", "A entidade renegociou o prazo de recebimento de seus clientes, que estavam em situação financeira difícil.", "A entidade constatou que as suas máquinas poderiam ser utilizadas por tempo maior do que a vida útil prevista."], "correta": 1, "comentario": "A equação patrimonial básica é: Ativo = Passivo + Patrimônio Líquido. Portanto, a resposta correta é: A entidade perdeu o controle de um imóvel, por meio de decisão judicial."}, {"id": "SM0076", "banca": "FGV - Bach (CFC)/CFC/2º Exame de Suficiência/2024", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Leia o fragmento a seguir: Passivo é a obrigação _____ da entidade de transferir um recurso econômico como resultado de eventos _____. Assinale a opção cujos itens completam corretamente as lacunas do fragmento acima.", "alternativas": ["futura / presente", "futura / passados", "presente / futuros", "presente / passados"], "correta": 3, "comentario": "Passivo é uma obrigação presente da entidade de transferir recurso econômico como resultado de eventos passados. Portanto, a resposta correta é: presente / passados"}, {"id": "SM0077", "banca": "FGV - AL (CAM DEP)/CAM DEP/Contador/2023", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Em relação às bases de mensuração para reconhecimento dos elementos nas demonstrações contábeis, assinale a opção que indica apenas as querefletem valores de saída.", "alternativas": ["Custo corrente e valor justo.", "Valor justo e valor realizável.", "Custo corrente e custo histórico.", "Valor realizável e custo corrente.", "Custo histórico e valor realizável."], "correta": 1, "comentario": "A alternativa correta corresponde ao conceito contábil exigido pela norma ou pelo enunciado. Portanto, a resposta correta é: Valor justo e valor realizável."}, {"id": "SM0078", "banca": "FGV - ADP (DPE RO)/DPE RO/Contábil/2025", "assunto": "CFC / Contabilidade", "nivel": "Médio", "enunciado": "Uma conta que é apresentada na Demonstração das Mutações do Patrimônio Líquido e que afeta o total do patrimônio líquido: é o(", "alternativas": ["aumento de capital social com a utilização de reservas.", "reversão de reserva patrimonial para a conta de prejuízos acumulados.", "reversão da reserva de lucros a realizar para a conta de dividendos a pagar.", "transferência de valores de outros resultados abrangentes para o resultado do exercício.", "apuração do lucro do período, antes do reconhecimento do imposto sobre a renda e contribuição social."], "correta": 3, "comentario": "Patrimônio líquido é a participação residual nos ativos da entidade depois da dedução de todos os passivos. Portanto, a resposta corre
